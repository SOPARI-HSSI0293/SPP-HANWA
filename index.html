<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP & PACKING STANDARD - HANWA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        iframe { border: none; width: 100%; height: 100%; min-height: 500px; background: white; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0f172a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bg-login {
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // URL API Google Apps Script dan Logo
        const API_URL = "https://script.google.com/macros/s/AKfycbyHcK8rAGNjYlM4_8iQ8fz1vV8mhHvkgqPP64589EDTH5xBv2u_s3r6mXVJPPLwlA6-/exec";
        const LOGO_URL = "https://deliveryhanwa.wordpress.com/wp-content/uploads/2025/11/logo-hanwa-2.png";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState("");
            const [userData, setUserData] = useState([]); 
            const [customers, setCustomers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [loginLoading, setLoginLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCust, setSelectedCust] = useState(null);
            const [viewType, setViewType] = useState("Link_Packing"); 
            
            // State Form Login
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [loginMsg, setLoginMsg] = useState("");

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    
                    // Menangani format data gabungan {customers: [], users: []}
                    if (data.customers && data.users) {
                        setCustomers(data.customers);
                        setUserData(data.users);
                        console.log("Data users dimuat:", data.users.length);
                    } else {
                        // Fallback jika format tidak sesuai
                        setCustomers(Array.isArray(data) ? data : []);
                        setUserData([]);
                    }
                } catch (err) {
                    console.error("Gagal mengambil data:", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setLoginLoading(true);
                setLoginMsg("");

                if (userData.length === 0) {
                    setLoginMsg("Sistem sedang sinkronisasi data user. Silakan tunggu sebentar.");
                    setLoginLoading(false);
                    return;
                }

                // Autentikasi tidak sensitif karakter (case-insensitive)
                // Data Users GAS: u[0] = User, u[1] = Pass, u[2] = Role
                const foundUser = userData.find(u => {
                    if (!u[0] || !u[1]) return false;
                    const uName = u[0].toString().toLowerCase();
                    const uPass = u[1].toString().toLowerCase();
                    return uName === username.toLowerCase() && uPass === password.toLowerCase();
                });

                setTimeout(() => {
                    if (foundUser) {
                        setIsLoggedIn(true);
                        setUserRole(foundUser[2] || "STAFF");
                    } else {
                        setLoginMsg("Username atau Password tidak terdaftar.");
                    }
                    setLoginLoading(false);
                }, 800);
            };

            const filteredCustomers = useMemo(() => {
                return customers.filter(c => 
                    c.Customer_Name && c.Customer_Name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [customers, searchTerm]);

            const currentWarning = useMemo(() => {
                if (!selectedCust) return "";
                return viewType === "Link_Proses" 
                    ? (selectedCust.Warning_Note_Proses || "STANDAR NORMAL PROSES")
                    : (selectedCust.Warning_Note_Packing || "STANDAR NORMAL PACKING");
            }, [selectedCust, viewType]);

            // Tampilan Halaman Login
            if (!isLoggedIn) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-login p-6">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all">
                            <div className="p-10 bg-white flex flex-col items-center border-b border-gray-50">
                                <img src={LOGO_URL} alt="Hanwa Logo" className="h-20 mb-6 object-contain" />
                                <h1 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Database Login</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-2 text-center">Standard Process & Packing Viewer</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-10 space-y-5">
                                {loginMsg && (
                                    <div className="bg-red-50 text-red-600 p-4 rounded-xl text-xs font-black text-center border border-red-100 animate-pulse">
                                        {loginMsg}
                                    </div>
                                )}
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Username</label>
                                    <input 
                                        type="text" required
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-800 transition-all font-semibold"
                                        value={username} onChange={(e) => setUsername(e.target.value)}
                                        placeholder="Ketik username..."
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Password</label>
                                    <input 
                                        type="password" required
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-800 transition-all font-semibold"
                                        value={password} onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Ketik password..."
                                    />
                                </div>
                                <button 
                                    type="submit" disabled={loginLoading || loading}
                                    className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-slate-800 transition-all transform active:scale-95 flex justify-center items-center shadow-xl text-sm tracking-widest"
                                >
                                    {loginLoading ? <div className="loader !border-white !border-t-slate-500"></div> : "M A S U K"}
                                </button>
                                {loading && (
                                    <div className="flex items-center justify-center gap-2 pt-2">
                                        <div className="loader !w-3 !h-3 !border-slate-200 !border-t-slate-400"></div>
                                        <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Sinkronisasi Server...</p>
                                    </div>
                                )}
                            </form>
                            <div className="p-6 bg-slate-50 text-center">
                                <p className="text-[9px] text-slate-400 font-bold uppercase">QCC 2026 | Shinsei Circle</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Tampilan Utama (Dashboard)
            return (
                <div className="flex flex-col h-screen overflow-hidden bg-slate-50">
                    {/* Header */}
                    <header className="bg-slate-900 text-white h-16 shadow-2xl flex justify-between items-center px-6 z-30">
                        <div className="flex items-center gap-5">
                            <img src={LOGO_URL} alt="Hanwa" className="h-9 brightness-0 invert" />
                            <div className="h-8 w-[1px] bg-slate-700 hidden sm:block"></div>
                            <div className="hidden sm:block">
                                <h1 className="text-lg font-black tracking-tighter leading-none uppercase italic">Standard Process & Packing</h1>
                                <p className="text-[10px] text-emerald-400 font-black uppercase tracking-widest opacity-80">Online Database</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right border-r border-slate-700 pr-6 hidden md:block">
                                <p className="text-[9px] text-slate-500 font-black uppercase tracking-[0.2em]">Active Session</p>
                                <p className="text-xs font-black text-emerald-400 uppercase">{username} <span className="text-slate-400 font-normal">({userRole})</span></p>
                            </div>
                            <button 
                                onClick={() => setIsLoggedIn(false)} 
                                className="bg-slate-800 p-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-red-600 transition-all shadow-lg"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg>
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-grow overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-80 bg-white border-r border-slate-200 flex flex-col shadow-2xl z-20">
                            {/* Tipe Dokumen */}
                            <div className="p-6 border-b border-slate-50 bg-white">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 block">1. PILIH JENIS STANDAR</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={() => setViewType("Link_Proses")}
                                        className={`py-3.5 rounded-2xl text-[11px] font-black tracking-widest transition-all transform active:scale-95 ${viewType === 'Link_Proses' ? 'bg-slate-100 text-slate-900 shadow-inner ring-1 ring-slate-200' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}
                                    >
                                        PROSES
                                    </button>
                                    <button 
                                        onClick={() => setViewType("Link_Packing")}
                                        className={`py-3.5 rounded-2xl text-[11px] font-black tracking-widest transition-all transform active:scale-95 ${viewType === 'Link_Packing' ? 'bg-emerald-600 text-white shadow-xl' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}
                                    >
                                        PACKING
                                    </button>
                                </div>
                            </div>

                            {/* Daftar Customer */}
                            <div className="p-6 flex-grow flex flex-col overflow-hidden">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 block">2. CARI NAMA CUSTOMER</label>
                                <div className="relative mb-6">
                                    <input 
                                        type="text"
                                        placeholder="Cari..."
                                        className="w-full p-4 pl-12 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none focus:bg-white focus:ring-2 focus:ring-emerald-500 transition-all shadow-sm"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 absolute left-4 top-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-2">
                                    {filteredCustomers.length > 0 ? (
                                        filteredCustomers.map((cust, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => setSelectedCust(cust)}
                                                className={`w-full text-left px-5 py-4 rounded-2xl text-[13px] transition-all transform hover:translate-x-1 ${selectedCust?.Customer_Name === cust.Customer_Name ? 'bg-blue-600 text-white font-black shadow-lg scale-[1.02]' : 'bg-white text-slate-400 font-bold border border-slate-100 hover:bg-slate-50 shadow-sm'}`}
                                            >
                                                {cust.Customer_Name.toUpperCase()}
                                            </button>
                                        ))
                                    ) : (
                                        <div className="flex flex-col items-center justify-center pt-10 opacity-30">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <p className="text-[10px] font-black uppercase">Tidak Ditemukan</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Footer Sidebar */}
                            <div className="p-5 bg-slate-900 flex items-center gap-4">
                                <div className="p-2 bg-emerald-500 rounded-lg shadow-lg shadow-emerald-500/30">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <div>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Status Sinkronisasi</p>
                                    <p className="text-[10px] font-black text-emerald-400 uppercase leading-none italic">Sistem Terhubung</p>
                                </div>
                            </div>
                        </aside>

                        {/* Viewer Utama */}
                        <main className="flex-grow flex flex-col p-6 overflow-hidden">
                            {selectedCust ? (
                                <div className="h-full flex flex-col gap-4">
                                    {/* Judul Viewer */}
                                    <div className="bg-white rounded-3xl p-5 flex justify-between items-center shadow-sm border border-slate-100">
                                        <div className="flex items-center gap-4">
                                            <div className="w-1.5 h-8 bg-emerald-500 rounded-full"></div>
                                            <div>
                                                <h2 className="font-black text-slate-800 text-lg uppercase leading-none tracking-tight">{selectedCust.Customer_Name}</h2>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Status: Terverifikasi Online</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm ${viewType === 'Link_Proses' ? 'bg-yellow-100 text-yellow-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                {viewType.replace('Link_', 'STANDAR ')}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Frame Iframe */}
                                    <div className="flex-grow bg-white rounded-3xl overflow-hidden shadow-2xl border-4 border-white relative group">
                                        {loading && (
                                            <div className="absolute inset-0 bg-white/80 flex items-center justify-center z-10">
                                                <div className="loader"></div>
                                            </div>
                                        )}
                                        <iframe 
                                            key={`${selectedCust.Customer_Name}-${viewType}`}
                                            src={selectedCust[viewType]} 
                                            className="w-full h-full"
                                            onLoad={() => console.log("Iframe loaded")}
                                        ></iframe>
                                    </div>

                                    {/* Catatan Warning Bawah */}
                                    <div className={`p-7 rounded-[2.5rem] flex items-center gap-6 shadow-2xl transition-all duration-700 transform hover:scale-[1.01] ${viewType === 'Link_Proses' ? 'bg-yellow-400 ring-8 ring-yellow-400/20' : 'bg-emerald-400 ring-8 ring-emerald-400/20'}`}>
                                        <div className="bg-white p-4 rounded-3xl shadow-lg animate-bounce">
                                            <svg xmlns="http://www.w3.org/2000/svg" className={`h-8 w-8 ${viewType === 'Link_Proses' ? 'text-yellow-600' : 'text-emerald-600'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                            </svg>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-black text-black/40 uppercase tracking-[0.2em] mb-1">CATATAN PENTING HARUS DIPERHATIKAN:</span>
                                            <h2 className="text-3xl font-black text-black uppercase tracking-tight leading-none italic">{currentWarning}</h2>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col h-full items-center justify-center text-slate-300">
                                    <div className="relative mb-10">
                                        <div className="absolute inset-0 bg-emerald-500 rounded-full blur-3xl opacity-10 animate-pulse"></div>
                                        <img src={LOGO_URL} alt="Hanwa" className="w-56 opacity-10 grayscale relative z-10" />
                                    </div>
                                    <div className="text-center">
                                        <p className="text-2xl font-black text-slate-300 uppercase tracking-tighter italic">SOP Viewer Online</p>
                                        <p className="text-sm font-bold text-slate-200 mt-2">Silakan pilih jenis dokumen dan nama customer untuk memulai</p>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
